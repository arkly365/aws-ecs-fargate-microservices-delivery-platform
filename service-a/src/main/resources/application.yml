server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: service-a

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:serviceadb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

app:
  environment: ${APP_ENV:local}
  branch: ${APP_BRANCH:unknown}
  imageTag: ${APP_IMAGE_TAG:unknown}
  serviceBBaseUrl: ${APP_SERVICE_B_BASE_URL:http://lab-alb-591993737.ap-northeast-1.elb.amazonaws.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}] %-5level %logger - %msg%n"