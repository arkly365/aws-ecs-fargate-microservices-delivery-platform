server:
  port: ${SERVER_PORT:8083}

spring:
  datasource:
    url: jdbc:mysql://appdb.c3ai6e6kuro7.ap-northeast-1.rds.amazonaws.com:3306/service_b_db?useSSL=false&serverTimezone=Asia/Taipei
    username: admin
    password: Admin1234!

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  sql:
    init:
      mode: never

app:
  environment: ${APP_ENV:local}
  branch: ${APP_BRANCH:unknown}
  imageTag: ${APP_IMAGE_TAG:unknown}
  serviceBBaseUrl: ${APP_SERVICE_B_BASE_URL:http://lab-alb-591993737.ap-northeast-1.elb.amazonaws.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO