server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: service-b

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/service_b_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  sql:
    init:
      mode: never

app:
  environment: ${APP_ENV:local}
  branch: ${APP_BRANCH:unknown}
  imageTag: ${APP_IMAGE_TAG:unknown}
  serviceBBaseUrl: ${APP_SERVICE_B_BASE_URL:http://lab-alb-591993737.ap-northeast-1.elb.amazonaws.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}] %-5level %logger - %msg%n"