server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: service-b
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:servicebdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: always

app:
  environment: ${APP_ENV:local}
  branch: ${APP_BRANCH:unknown}
  imageTag: ${APP_IMAGE_TAG:unknown}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
